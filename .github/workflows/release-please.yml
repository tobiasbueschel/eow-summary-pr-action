name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - name: Update floating action tags
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch --tags --force
          git tag -fa "v${{ steps.release.outputs.major }}" -m "Release v${{ steps.release.outputs.major }}" "${{ steps.release.outputs.sha }}"
          git tag -fa "v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}" -m "Release v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}" "${{ steps.release.outputs.sha }}"
          git push origin "v${{ steps.release.outputs.major }}" "v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}" --force
